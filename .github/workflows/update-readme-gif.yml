name: Update README Dynamic GIF

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *' # Run every 30 minutes
  push:
    paths:
      - 'scripts/update-gif.mjs'
      - '.github/workflows/update-readme-gif.yml'

permissions:
  contents: write
  actions: write

jobs:
  update-gif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-gif.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          # Only proceed if there are changes
          if ! git diff --staged --quiet; then
            LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
            if [[ "$LAST_COMMIT_MSG" == "chore: update dynamic gif based on time" ]]; then
              echo "Amending last bot commit to keep history clean..."
              git commit --amend --no-edit
              git push origin main --force-with-lease
            else
              echo "Creating new commit for GIF update..."
              git commit -m "chore: update dynamic gif based on time"
              git push origin main
            fi
          else
            echo "No changes detected."
          fi

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
